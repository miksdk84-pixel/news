<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="M_logo.png">
    <style>
        :root { 
            --gold: #ff9d00; 
            --bg: #000; 
            --glass: rgba(25, 25, 25, 0.5); /* Semitransparent til glas */
            --border: rgba(255, 157, 0, 0.15);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('M_logo.png'); background-size: 50%; background-position: center; background-repeat: no-repeat;
        }

        /* Mørkt lag over logoet for læsbarhed */
        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: -1; }

        /* iPHONE STATUS BAR */
        .status-bar { 
            padding: 15px 25px 5px; display: flex; justify-content: space-between; 
            font-size: 12px; font-weight: 700; color: #fff; letter-spacing: -0.5px; z-index: 10;
        }
        .status-icons { display: flex; gap: 5px; align-items: center; }
        .battery { width: 17px; height: 8px; border: 1px solid #fff; border-radius: 2px; position: relative; }
        .battery::after { content: ""; position: absolute; top: 1px; left: 1px; width: 12px; height: 4px; background: #fff; border-radius: 1px; }

        /* HEADER med dit logo */
        header { padding: 15px 20px; text-align: center; border-bottom: 1px solid var(--border); }
        .logo-small { width: 22px; vertical-align: middle; margin-bottom: 4px; filter: drop-shadow(0 0 5px var(--gold)); }
        .app-title { font-weight: 800; font-size: 13px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }

        /* IPHONE HOME SCREEN ICONS (Genrer) */
        .tabs { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; 
            padding: 25px 20px; background: rgba(0,0,0,0.3);
        }
        .tab { 
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1); /* Liquid animation */
        }
        .tab:active { transform: scale(0.9); opacity: 0.7; }
        
        /* De runde "app" ikoner */
        .icon-circle { 
            width: 60px; height: 60px; border-radius: 16px; 
            background: #111; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .tab.active .icon-circle { background: var(--gold); border-color: var(--gold); color: #000; box-shadow: 0 0 20px rgba(255,157,0,0.3); }
        
        .tab-label { font-size: 10px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .tab.active .tab-label { color: #fff; }

        /* LIQUID GLASS SEARCH BOX */
        .controls { padding: 10px 20px 20px; }
        .search-wrap { position: relative; }
        .search-box { 
            background: var(--glass); /* Glassmorphism */
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); /* Frostet effekt */
            border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px;
            width: 100%; color: #fff; font-size: 16px; font-weight: 600; outline: none; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: 0.3s ease;
        }
        .search-box:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,157,0,0.2); }

        /* TRACK LIST */
        #results { flex-grow: 1; overflow-y: auto; padding: 0 20px 140px; -webkit-overflow-scrolling: touch; }
        .track { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 10px; border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1); /* Liquid feel */
        }
        .track:active { background: rgba(255, 157, 0, 0.05); transform: scale(0.98); }
        .t-name { font-weight: 700; font-size: 14px; color: #fff; margin-bottom: 4px; display: block; }
        .t-path { font-size: 9px; color: #444; text-transform: uppercase; font-family: monospace; }

        .copy-icon { opacity: 0.2; transition: 0.3s ease; }
        .copied .copy-icon { opacity: 1; stroke: var(--gold); transform: scale(1.2); }

        /* LIQUID GLASS DOCK */
        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: var(--glass); /* Glassmorphism */
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); /* Frostet effekt */
            padding: 20px 20px 45px; 
            border-top: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
        }
        .panic-btn { 
            background: var(--gold); color: #000; width: 100%; border: none; padding: 18px; 
            border-radius: 14px; font-weight: 900; font-size: 13px; letter-spacing: 3px;
            box-shadow: 0 8px 25px rgba(255, 157, 0, 0.4);
            transition: 0.3s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .panic-btn:active { transform: scale(0.95); box-shadow: 0 4px 15px rgba(255, 157, 0, 0.2); }
    </style>
</head>
<body>

<div class="status-bar">
    <div id="clock">9:41</div>
    <div class="status-icons">
        <span>📶</span><span>LTE</span>
        <div class="battery"></div>
    </div>
</div>

<header>
    <img src="M_logo.png" class="logo-small">
    <span class="app-title">MiksMusik OS</span>
</header>

<div class="tabs">
    <div class="tab active" onclick="setVibe('', this)">
        <div class="icon-circle">🎧</div>
        <span class="tab-label">Alt</span>
    </div>
    <div class="tab" onclick="setVibe('dansk', this)">
        <div class="icon-circle">🇩🇰</div>
        <span class="tab-label">Dansk</span>
    </div>
    <div class="tab" onclick="setVibe('house', this)">
        <div class="icon-circle">💃</div>
        <span class="tab-label">House</span>
    </div>
    <div class="tab" onclick="setVibe('remix', this)">
        <div class="icon-circle">🔥</div>
        <span class="tab-label">Remix</span>
    </div>
</div>

<div class="controls">
    <div class="search-wrap">
        <input type="text" id="search" class="search-box" placeholder="Søg i 9000+ sange..." onkeyup="filter()" autocomplete="off">
    </div>
</div>

<div id="results"></div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';

    // Opdater uret som på en iPhone
    function updateClock() {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        document.getElementById('clock').innerText = `${hours}:${minutes}`;
    }
    setInterval(updateClock, 10000);
    updateClock();

    async function init() {
        try {
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            db = JSON.parse(text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, ''));
            filter();
        } catch (e) { console.log("Fejl ved indlæsning"); }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        filter();
    }

    function filter() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        
        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div style="text-align:center; padding-top:60px; color:#111; font-weight:900; font-size:10px; letter-spacing:5px;">KLAR</div>';
            return;
        }

        const matches = db.filter(s => {
            const txt = (s.navn + (s.sti || '')).toLowerCase();
            return txt.includes(q) && txt.includes(vibe);
        });

        if (matches.length === 0) { res.innerHTML = '<div style="text-align:center; padding-top:60px; color:var(--gold); font-size:10px; letter-spacing:2px;">INGEN MATCH</div>'; return; }
        
        res.innerHTML = matches.slice(0, 50).map(s => `
            <div class="track" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <div style="flex:1; min-width:0; padding-right:10px;">
                    <span class="t-name">${s.navn}</span>
                    <span class="t-path">${s.sti || ''}</span>
                </div>
                <svg class="copy-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            </div>
        `).join('');
    }

    function copy(el, path) {
        navigator.clipboard.writeText(path);
        el.classList.add('copied');
        const s = document.getElementById('search');
        const old = s.placeholder;
        s.placeholder = "KOPIERET TIL MIKSMUSIK!";
        setTimeout(() => { 
            el.classList.remove('copied');
            s.placeholder = old;
        }, 1200);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.tab')[3]);
    }

    init();
</script>

</body>
</html>
