<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-ELITE LIVE HUB</title>
    <style>
        :root { --brndby: #ffee00; --bg: #050505; --card: #111; --live: #ff3b3b; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: #fff; margin: 0; padding-bottom: 80px; }
        header { padding: 25px; border-bottom: 1px solid #222; text-align: center; }
        h1 { margin: 0; font-size: 16px; letter-spacing: 3px; color: var(--brndby); text-transform: uppercase; }

        .league-nav { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #0a0a0a; position: sticky; top: 0; z-index: 100; }
        .nav-item { background: #222; padding: 8px 15px; border-radius: 20px; font-size: 10px; font-weight: 800; white-space: nowrap; border: 1px solid #333; }
        .nav-item.active { background: var(--brndby); color: #000; border-color: var(--brndby); }

        .match-card { background: var(--card); margin: 15px; border-radius: 20px; border: 1px solid #222; overflow: hidden; }
        .match-top { background: #1a1a1a; padding: 8px 15px; font-size: 9px; color: #666; display: flex; justify-content: space-between; font-weight: 800; }
        .match-body { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .team { flex: 1; text-align: center; font-weight: 700; font-size: 14px; }
        .score-box { background: #000; padding: 10px; border-radius: 12px; min-width: 70px; text-align: center; border: 1px solid #333; }
        .score-val { font-size: 24px; font-weight: 900; color: var(--brndby); display: block; }
        
        .standings { margin: 15px; background: var(--card); border-radius: 20px; padding: 15px; border: 1px solid #222; }
        .row { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
        .pos { width: 25px; font-weight: 900; color: #444; }
        .team-n { flex: 1; font-weight: 600; }
        .pts { font-weight: 900; color: var(--brndby); }
    </style>
</head>
<body>

<header><h1>M-ELITE LIVE HUB</h1></header>

<div class="league-nav">
    <div class="nav-item active" onclick="fetchData('PL', this)">PREMIER LEAGUE</div>
    <div class="nav-item" onclick="fetchData('CL', this)">CHAMPIONS LEAGUE</div>
    <div class="nav-item" onclick="fetchData('PD', this)">LA LIGA</div>
</div>

<div id="content">
    <div style="padding: 15px 20px 0; font-size: 10px; font-weight: 900; color: #444; text-transform: uppercase;">Live / Kommende Kampe</div>
    <div id="matchList"></div>

    <div style="padding: 10px 20px 0; font-size: 10px; font-weight: 900; color: #444; text-transform: uppercase;">Stilling</div>
    <div class="standings" id="standingList"></div>
</div>

<script>
    const API_KEY = 'b83a12fa69594f2ebf06060c6a6feb26';
    const baseUrl = 'https://api.football-data.org/v4/competitions/';

    async function fetchData(leagueCode, element) {
        if(element) {
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            element.classList.add('active');
        }

        const headers = { 'X-Auth-Token': API_KEY };
        
        // Hent Kampe
        try {
            const mResponse = await fetch(`${baseUrl}${leagueCode}/matches?limit=5`, { headers });
            const mData = await mResponse.json();
            renderMatches(mData.matches, leagueCode);

            // Hent Stilling
            const sResponse = await fetch(`${baseUrl}${leagueCode}/standings`, { headers });
            const sData = await sResponse.json();
            renderStandings(sData.standings[0].table);
        } catch (error) {
            console.error("Fejl ved hentning af data:", error);
        }
    }

    function renderMatches(matches, league) {
        const list = document.getElementById('matchList');
        if(!matches || matches.length === 0) { list.innerHTML = '<p style="padding:20px; font-size:12px; color:#444;">Ingen kampe fundet.</p>'; return; }
        
        list.innerHTML = matches.map(m => `
            <div class="match-card">
                <div class="match-top"><span>${league}</span> <span>${m.status}</span></div>
                <div class="match-body">
                    <div class="team">${m.homeTeam.shortName || m.homeTeam.name}</div>
                    <div class="score-box">
                        <span class="score-val">${m.score.fullTime.home ?? 0} - ${m.score.fullTime.away ?? 0}</span>
                    </div>
                    <div class="team">${m.awayTeam.shortName || m.awayTeam.name}</div>
                </div>
            </div>
        `).join('');
    }

    function renderStandings(table) {
        const list = document.getElementById('standingList');
        list.innerHTML = `
            <div class="row" style="font-size:9px; color:#444; font-weight:900;">
                <span class="pos">#</span><span class="team-n">HOLD</span><span>K</span><span class="pts">P</span>
            </div>
        ` + table.slice(0, 10).map(t => `
            <div class="row">
                <span class="pos">${t.position}</span>
                <span class="team-n">${t.team.name}</span>
                <span style="width:30px; text-align:center;">${t.playedGames}</span>
                <span class="pts">${t.points}</span>
            </div>
        `).join('');
    }

    // Start med Premier League
    fetchData('PL');
</script>

</body>
</html>
