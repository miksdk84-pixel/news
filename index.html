<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksMusik News</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/miksdk84-pixel/minmusik/main/M_logo.png">
    <style>
        :root { 
            --gold: #ff9d00; 
            --neon-blue: #00f2ff;
            --neon-pink: #ff007a;
            --bg: #050505; 
            --card: #121212; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            background-image: url('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/main/M_logo.png'); 
            background-size: cover; background-position: center;
        }

        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: -1; }

        /* HEADER */
        header { padding: 60px 25px 20px; border-bottom: 2px solid var(--neon-blue); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .date-line { font-size: 10px; font-weight: 800; color: var(--neon-blue); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px; }
        .app-title { font-weight: 900; font-size: 32px; letter-spacing: -1px; color: #fff; margin: 0; }

        /* TRENDING TICKER */
        .breaking-bar { background: var(--neon-blue); color: #000; padding: 10px 0; font-size: 11px; font-weight: 900; text-transform: uppercase; overflow: hidden; white-space: nowrap; }
        .ticker-content { display: inline-block; animation: ticker 25s linear infinite; padding-left: 100%; }
        @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-100%); } }
        .ticker-item { margin-right: 50px; }

        /* NEWS FEED */
        #results { flex-grow: 1; overflow-y: auto; padding: 25px; -webkit-overflow-scrolling: touch; }
        .section-header { font-size: 20px; font-weight: 900; margin: 20px 0 15px; color: var(--neon-pink); text-transform: uppercase; letter-spacing: 1px; }
        
        .news-card { 
            background: var(--card); border-radius: 16px; margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.05); overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .news-img { width: 100%; height: 180px; background: #1a1a1a; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .news-img img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .card-tag { position: absolute; top: 15px; left: 15px; background: var(--neon-blue); color: #000; padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
        
        .news-body { padding: 20px; }
        .track-title { font-size: 20px; font-weight: 800; color: #fff; line-height: 1.2; margin-bottom: 8px; }
        .track-desc { font-size: 13px; color: #888; line-height: 1.5; }

        /* DOCK */
        .dock { position: fixed; bottom: 30px; left: 25px; right: 25px; display: flex; gap: 15px; }
        .nav-btn { 
            flex: 1; background: rgba(20,20,20,0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; padding: 15px; border-radius: 15px; font-weight: 800; font-size: 12px; text-transform: uppercase;
        }
        .nav-btn.active { border-color: var(--neon-blue); color: var(--neon-blue); }
    </style>
</head>
<body>

<header>
    <div id="current-date" class="date-line">CARREGANDO...</div>
    <h1 class="app-title">MiksMusik News</h1>
</header>

<div class="breaking-bar">
    <div class="ticker-content" id="ticker">
        LÆSER DE SENESTE HITLISTER... +++ BREAKING: NYE REMIXES PÅ VEJ +++ TOP 10 TRENDING NU +++
    </div>
</div>

<div id="results">
    <div class="section-header">Breaking Hits</div>
    <div id="news-feed">
        </div>
</div>

<div class="dock">
    <button class="nav-btn active">Trending</button>
    <button class="nav-btn" onclick="window.location.href='https://miksdk84-pixel.github.io/minmusik/'">Min Musik</button>
</div>

<script>
    function updateDate() {
        const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('da-DK', options).toUpperCase();
    }

    const topHits = [
        { title: "Espresso", artist: "Sabrina Carpenter", tag: "HOT", desc: "Sabrina Carpenter dominerer hitlisterne med dette års største sommerhit." },
        { title: "Birds of a Feather", artist: "Billie Eilish", tag: "TRENDING", desc: "Billie Eilish fortsætter sin sejrsgang med endnu en ørehænger." },
        { title: "A Bar Song (Tipsy)", artist: "Shaboozey", tag: "NEW", desc: "Country-rap når nye højder med Shaboozeys massive klub-hit." },
        { title: "Not Like Us", artist: "Kendrick Lamar", tag: "TOP 10", desc: "Kendrick Lamars seneste track er det mest spillede i DJ-booths verden over." }
    ];

    function loadNews() {
        const feed = document.getElementById('news-feed');
        const ticker = document.getElementById('ticker');

        ticker.innerHTML = topHits.map(h => `+++ BREAKING: ${h.title.toUpperCase()} AF ${h.artist.toUpperCase()} `).join(' ');

        feed.innerHTML = topHits.map(h => `
            <div class="news-card">
                <div class="news-img">
                    <span class="card-tag">${h.tag}</span>
                    <div style="font-size: 50px; font-weight: 900; opacity: 0.1;">HIT</div>
                </div>
                <div class="news-body">
                    <div class="track-title">${h.title}</div>
                    <div style="color: var(--neon-blue); font-weight: 700; margin-bottom: 10px;">${h.artist}</div>
                    <div class="track-desc">${h.desc}</div>
                </div>
            </div>
        `).join('');
    }

    window.onload = () => {
        updateDate();
        loadNews();
    };
</script>

</body>
</html>
