<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksNews AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ff9d00; 
            --bg: #050505; 
            --card: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 157, 0, 0.3);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* TOP INFO BAR (Ur & Vejr) */
        .info-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 50px 25px 10px; background: #000; font-size: 12px; font-weight: 800;
        }
        .weather-widget { color: var(--gold); display: flex; align-items: center; gap: 5px; }
        #clock { letter-spacing: 1px; }

        /* HEADER */
        header { padding: 10px 25px 20px; background: #000; border-bottom: 2px solid var(--gold); }
        .app-title { font-weight: 900; font-size: 32px; letter-spacing: -1px; margin: 0; }
        .ai-status { font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        /* NAV */
        .nav-tabs { display: flex; background: #000; padding: 10px 20px; gap: 20px; overflow-x: auto; scrollbar-width: none; }
        .tab { font-size: 13px; font-weight: 800; color: #444; text-transform: uppercase; padding-bottom: 8px; white-space: nowrap; }
        .tab.active { color: #fff; border-bottom: 2px solid var(--gold); }

        /* CONTENT */
        #content { flex-grow: 1; overflow-y: auto; padding: 20px; }
        
        .ai-summary-card {
            background: linear-gradient(135deg, rgba(255,157,0,0.1) 0%, rgba(0,0,0,0) 100%);
            border: 1px solid var(--border); border-radius: 15px; padding: 20px; margin-bottom: 20px;
        }
        .news-card { 
            background: var(--card); border-radius: 12px; margin-bottom: 15px; 
            padding: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .news-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .news-desc { font-size: 13px; color: #888; line-height: 1.5; }

        /* DOCK */
        .dock { padding: 20px 25px 40px; background: #000; border-top: 1px solid #1a1a1a; }
        .back-btn { 
            width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; 
            padding: 15px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="info-bar">
    <div id="clock">00:00:00</div>
    <div class="weather-widget">
        <span id="temp">12°C</span>
        <span id="weather-icon">☀️</span>
    </div>
</div>

<header>
    <h1 class="app-title">MiksNews AI</h1>
    <div class="ai-status">Neural News Engine // Active</div>
</header>

<nav class="nav-tabs">
    <div class="tab active" onclick="showSection('nyheder', this)">Nyheder</div>
    <div class="tab" onclick="showSection('sport', this)">Sport</div>
    <div class="tab" onclick="showSection('tv', this)">Sport i TV</div>
</nav>

<div id="content">
    <div class="ai-summary-card">
        <div style="font-size: 10px; font-weight: 900; color: var(--gold); margin-bottom: 10px; text-transform: uppercase;">AI Opsummering</div>
        <div id="ai-text" style="font-size: 14px; line-height: 1.4; font-weight: 600;">Analyserer dagens vigtigste historier for dig...</div>
    </div>
    <div id="news-list"></div>
</div>

<div class="dock">
    <button class="back-btn" onclick="window.location.href='https://miksdk84-pixel.github.io/minmusik/'">← Tilbage til Musik</button>
</div>

<script>
    // LIVE UR
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('da-DK');
    }
    setInterval(updateClock, 1000);

    // DATA
    const data = {
        nyheder: [
            { title: "Solskinsvejr i vente", desc: "Meteorologerne lover op mod 18 grader i weekenden." },
            { title: "Nye tech-trends 2026", desc: "Her er hvad du skal holde øje med i det nye år." }
        ],
        sport: [
            { title: "Målfest i Parken", desc: "Landsholdet sikrer vigtig sejr i de døende minutter." }
        ],
        tv: [
            { time: "20:45", title: "Champions League Finale", channel: "TV3+" }
        ]
    };

    function showSection(section, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        
        const list = document.getElementById('news-list');
        list.innerHTML = '';
        
        // AI tekst skifter baseret på sektion
        const aiText = document.getElementById('ai-text');
        if(section === 'nyheder') aiText.innerText = "Der er fokus på vejret og samfundet i dag. Husk solcremen!";
        if(section === 'sport') aiText.innerText = "Stor sportsdag forude! Især fodbolden trækker overskrifter.";
        if(section === 'tv') aiText.innerText = "Planlæg din aften: Champions League er aftenens absolutte højdepunkt.";

        data[section].forEach(item => {
            list.innerHTML += `
                <div class="news-card">
                    ${item.time ? `<div style="color:var(--gold); font-weight:800; font-size:12px;">${item.time}</div>` : ''}
                    <div class="news-title">${item.title}</div>
                    ${item.desc ? `<div class="news-desc">${item.desc}</div>` : ''}
                    ${item.channel ? `<div style="font-size:10px; color:#444; margin-top:5px;">KANAL: ${item.channel}</div>` : ''}
                </div>
            `;
        });
    }

    window.onload = () => {
        updateClock();
        showSection('nyheder', document.querySelector('.tab'));
    };
</script>

</body>
</html>
