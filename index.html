<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksNews Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ff9d00; --bg: #050505; --card: #121212; --border: rgba(255, 157, 0, 0.2); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* TOP INFO (UR & VEJR) */
        .info-bar { display: flex; justify-content: space-between; padding: 50px 25px 10px; background: #000; font-size: 11px; font-weight: 800; }

        header { padding: 10px 25px 15px; background: #000; border-bottom: 2px solid var(--gold); }
        .app-title { font-weight: 900; font-size: 32px; letter-spacing: -1px; margin: 0; }

        /* NAVIGATION */
        .nav-tabs { display: flex; background: #000; padding: 10px 20px; gap: 20px; border-bottom: 1px solid #1a1a1a; overflow-x: auto; scrollbar-width: none; }
        .tab { font-size: 13px; font-weight: 800; color: #444; text-transform: uppercase; padding-bottom: 8px; white-space: nowrap; cursor: pointer; }
        .tab.active { color: #fff; border-bottom: 2px solid var(--gold); }

        /* CONTENT */
        #content { flex-grow: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        
        .news-card { 
            background: var(--card); border-radius: 14px; margin-bottom: 15px; 
            padding: 20px; border: 1px solid #1a1a1a; display: block; cursor: pointer;
        }

        .news-title { font-size: 17px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; color: #fff; }
        .news-desc { font-size: 13px; color: #888; line-height: 1.5; }

        /* MODAL (ARTIKEL-LÆSER) */
        #news-reader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: none; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .reader-header { 
            padding: 50px 20px 15px; background: #111; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gold);
        }
        .close-btn { color: var(--gold); font-weight: 800; font-size: 14px; text-transform: uppercase; }
        
        #article-frame { flex-grow: 1; border: none; width: 100%; }

        /* DOCK */
        .dock { padding: 20px 25px 40px; background: #000; border-top: 1px solid #1a1a1a; }
        .back-btn { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="info-bar">
    <div id="clock">00:00:00</div>
    <div style="color: var(--gold);">LIVE FEED</div>
</div>

<header>
    <h1 class="app-title">MiksNews</h1>
</header>

<nav class="nav-tabs">
    <div class="tab active" onclick="fetchNews('https://www.dr.dk/nyheder/service/feeds/allenyheder', this)">Nyheder</div>
    <div class="tab" onclick="fetchNews('https://www.dr.dk/nyheder/service/feeds/sporten', this)">Sport</div>
    <div class="tab" onclick="fetchNews('https://www.bold.dk/rss/fodbold/', this)">Fodbold</div>
</nav>

<div id="content">
    <div style="text-align: center; padding: 50px; color: var(--gold);">HENTER NYHEDER...</div>
</div>

<div id="news-reader">
    <div class="reader-header">
        <div style="font-weight: 900; font-size: 12px; letter-spacing: 1px;">MIKSNEWS READER</div>
        <div class="close-btn" onclick="closeReader()">LUK ×</div>
    </div>
    <iframe id="article-frame" src=""></iframe>
</div>

<div class="dock">
    <button class="back-btn" onclick="window.location.href='https://miksdk84-pixel.github.io/minmusik/'">← MiksMusik DJ Pro</button>
</div>

<script>
    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('da-DK');
    }
    setInterval(updateClock, 1000);

    async function fetchNews(feedUrl, el) {
        if(el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        const container = document.getElementById('content');
        container.innerHTML = '<div style="text-align: center; padding: 50px; color: var(--gold);">SYNKRONISERER...</div>';

        try {
            const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}`);
            const data = await response.json();

            container.innerHTML = data.items.map(item => `
                <div class="news-card" onclick="openReader('${item.link}')">
                    <span style="font-size: 9px; font-weight: 800; color: var(--gold); text-transform: uppercase;">${new Date(item.pubDate).toLocaleTimeString('da-DK', {hour: '2-digit', minute:'2-digit'})}</span>
                    <div class="news-title">${item.title}</div>
                    <div class="news-desc">${item.description.replace(/<[^>]*>?/gm, '').substring(0, 120)}...</div>
                </div>
            `).join('');
        } catch (e) {
            container.innerHTML = 'FEJL';
        }
    }

    function openReader(url) {
        document.getElementById('article-frame').src = url;
        document.getElementById('news-reader').style.display = 'flex';
    }

    function closeReader() {
        document.getElementById('news-reader').style.display = 'none';
        document.getElementById('article-frame').src = '';
    }

    window.onload = () => fetchNews('https://www.dr.dk/nyheder/service/feeds/allenyheder');
</script>

</body>
</html>
