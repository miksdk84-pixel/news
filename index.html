<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksNews</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #ff9d00; 
            --bg: #050505; 
            --card: #121212; 
            --text-gray: #888;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER */
        header { padding: 60px 25px 20px; background: #000; border-bottom: 2px solid var(--gold); }
        .date-line { font-size: 10px; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .app-title { font-weight: 900; font-size: 32px; letter-spacing: -1px; margin: 5px 0 0; }

        /* NAVIGATION TABS */
        .nav-tabs { display: flex; background: #000; padding: 10px 20px; gap: 20px; border-bottom: 1px solid #1a1a1a; }
        .tab { font-size: 13px; font-weight: 800; color: #444; text-transform: uppercase; padding-bottom: 8px; position: relative; }
        .tab.active { color: #fff; }
        .tab.active::after { content: ""; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--gold); }

        /* CONTENT AREA */
        #content { flex-grow: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        
        .news-card { 
            background: var(--card); border-radius: 12px; margin-bottom: 15px; 
            border: 1px solid #1a1a1a; padding: 20px;
        }
        .category-tag { font-size: 9px; font-weight: 900; color: var(--gold); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .news-title { font-size: 18px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
        .news-desc { font-size: 13px; color: var(--text-gray); line-height: 1.5; }

        /* TV GUIDE SPECIAL STYLE */
        .tv-item { display: flex; gap: 15px; align-items: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a; }
        .tv-time { font-weight: 800; color: var(--gold); font-size: 14px; min-width: 50px; }
        .tv-info { flex: 1; }
        .tv-match { font-weight: 700; font-size: 15px; }
        .tv-channel { font-size: 11px; color: var(--text-gray); text-transform: uppercase; margin-top: 3px; }

        /* DOCK TILBAGE TIL MUSIK */
        .dock { padding: 20px 25px 40px; background: #000; border-top: 1px solid #1a1a1a; }
        .back-btn { 
            width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; 
            padding: 15px; border-radius: 12px; font-weight: 800; font-size: 12px; text-transform: uppercase;
        }
    </style>
</head>
<body>

<header>
    <div id="date" class="date-line"></div>
    <h1 class="app-title">MiksNews</h1>
</header>

<nav class="nav-tabs">
    <div class="tab active" onclick="showSection('nyheder', this)">Nyheder</div>
    <div class="tab" onclick="showSection('sport', this)">Sport</div>
    <div class="tab" onclick="showSection('tv', this)">Sport i TV</div>
</nav>

<div id="content">
    </div>

<div class="dock">
    <button class="back-btn" onclick="window.location.href='https://miksdk84-pixel.github.io/minmusik/'">← Tilbage til MiksMusik</button>
</div>

<script>
    const data = {
        nyheder: [
            { cat: "Indland", title: "Nye tiltag for nattelivet", desc: "Regeringen præsenterer i dag en række nye forslag, der skal gøre det sikrere at gå i byen i de store byer." },
            { cat: "Teknologi", title: "AI revolutionerer musikbranchen", desc: "Nye værktøjer gør det muligt for DJ's at organisere deres biblioteker hurtigere end nogensinde før." }
        ],
        sport: [
            { cat: "Superliga", title: "FCM vinder topbraget", desc: "Efter en intens kamp på MCH Arena lykkedes det midtjyderne at hive alle tre point hjem i overtiden." },
            { cat: "Formel 1", title: "Hamilton overrasker i kvalifikationen", desc: "Lewis Hamilton sikrede sig pole position foran Verstappen i en regnvåd session." }
        ],
        tv: [
            { time: "18:00", match: "FCM vs FCK", channel: "See / Viaplay" },
            { time: "20:45", match: "Real Madrid vs Man City", channel: "TV3+" },
            { time: "21:00", match: "Dansk Ishockey Finale", channel: "TV2 Sport" }
        ]
    };

    function showSection(section, el) {
        // Opdater tabs
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');

        const container = document.getElementById('content');
        container.innerHTML = '';

        if (section === 'tv') {
            container.innerHTML = '<h2 style="font-size: 18px; margin-bottom: 20px;">Dagens sport i TV</h2>';
            data.tv.forEach(item => {
                container.innerHTML += `
                    <div class="tv-item">
                        <div class="tv-time">${item.time}</div>
                        <div class="tv-info">
                            <div class="tv-match">${item.match}</div>
                            <div class="tv-channel">${item.channel}</div>
                        </div>
                    </div>
                `;
            });
        } else {
            data[section].forEach(item => {
                container.innerHTML += `
                    <div class="news-card">
                        <span class="category-tag">${item.cat}</span>
                        <div class="news-title">${item.title}</div>
                        <div class="news-desc">${item.desc}</div>
                    </div>
                `;
            });
        }
    }

    // Sæt dato og startvisning
    window.onload = () => {
        const options = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('date').innerText = new Date().toLocaleDateString('da-DK', options).toUpperCase();
        showSection('nyheder', document.querySelector('.tab'));
    };
</script>

</body>
</html>
