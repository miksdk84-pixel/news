<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-ELITE NEWSROOM</title>
    <style>
        :root { --brndby: #ffee00; --bg: #050505; --card: #111; --live: #ff3b3b; --text: #eee; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        header { padding: 20px; border-bottom: 1px solid #222; text-align: center; }
        h1 { margin: 0; font-size: 16px; letter-spacing: 3px; color: var(--brndby); text-transform: uppercase; }
        
        /* NAVIGATION */
        .nav-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: #0a0a0a; position: sticky; top: 0; z-index: 100; scrollbar-width: none; }
        .nav-item { background: #222; padding: 8px 15px; border-radius: 20px; font-size: 10px; font-weight: 800; white-space: nowrap; border: 1px solid #333; color: #fff; cursor: pointer; }
        .nav-item.active { background: var(--brndby); color: #000; border-color: var(--brndby); }

        /* NYHEDS KILDER SELECTOR */
        .source-picker { display: flex; gap: 8px; padding: 0 15px 15px; overflow-x: auto; scrollbar-width: none; }
        .source-btn { background: #151515; border: 1px solid #333; color: #888; font-size: 9px; padding: 6px 12px; border-radius: 6px; font-weight: 800; }
        .source-btn.active { border-color: var(--brndby); color: var(--brndby); }

        /* CARDS */
        .news-card { background: var(--card); margin: 0 15px 12px; padding: 18px; border-radius: 20px; border: 1px solid #222; display: block; text-decoration: none; color: inherit; }
        .news-source { color: var(--brndby); font-size: 9px; font-weight: 900; text-transform: uppercase; margin-bottom: 8px; display: block; opacity: 0.8; }
        .news-title { font-size: 15px; font-weight: 700; line-height: 1.4; margin: 0; }
        
        .match-card { background: var(--card); margin: 0 15px 12px; border-radius: 20px; border: 1px solid #222; overflow: hidden; }
        .match-top { background: #1a1a1a; padding: 8px 15px; font-size: 9px; color: #666; display: flex; justify-content: space-between; font-weight: 800; }
        .match-body { padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .team { flex: 1; text-align: center; font-weight: 700; font-size: 13px; }
        .score-box { background: #000; padding: 8px; border-radius: 12px; min-width: 65px; text-align: center; border: 1px solid #333; }
        .score-val { font-size: 20px; font-weight: 900; color: var(--brndby); display: block; }
        
        .section-label { padding: 25px 20px 10px; font-size: 10px; font-weight: 900; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .loading { padding: 40px; text-align: center; color: #444; font-size: 11px; font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<header><h1>M-ELITE NEWSROOM</h1></header>

<div class="nav-scroll">
    <div class="nav-item active" id="btnNews" onclick="showSection('news')">NYHEDER</div>
    <div class="nav-item" id="btnFootball" onclick="showSection('football')">LIVE SPORT</div>
</div>

<div id="newsSection">
    <div class="section-label">Vælg Medie</div>
    <div class="source-picker">
        <div class="source-btn active" onclick="fetchNews('dr', this)">DR</div>
        <div class="source-btn" onclick="fetchNews('tv2', this)">TV2</div>
        <div class="source-btn" onclick="fetchNews('eb', this)">EB</div>
        <div class="source-btn" onclick="fetchNews('bt', this)">BT</div>
    </div>
    <div id="newsList" class="loading">Henter nyheder...</div>
</div>

<div id="footballSection" style="display:none;">
    <div class="section-label">Top Focus 🇩🇰</div>
    <div class="match-card" style="border-color: rgba(255,238,0,0.4)">
        <div class="match-top"><span>SUPERLIGA</span> <span>SØN 16:00</span></div>
        <div class="match-body">
            <div class="team" style="color:var(--brndby)">Brøndby IF</div>
            <div class="score-box"><span class="score-val">VS</span></div>
            <div class="team">AGF</div>
        </div>
    </div>
    <div id="matchList"></div>
</div>

<script>
    const FOOTBALL_API = 'b83a12fa69594f2ebf06060c6a6feb26';
    const FEEDS = {
        dr: 'https://www.dr.dk/nyheder/service/feeds/allenyheder',
        tv2: 'https://feeds.tv2.dk/nyheder/rss',
        eb: 'https://ekstrabladet.dk/rssfeed/nyheder/',
        bt: 'https://www.bt.dk/nyheder/rss'
    };

    function showSection(section) {
        document.getElementById('btnNews').classList.toggle('active', section === 'news');
        document.getElementById('btnFootball').classList.toggle('active', section === 'football');
        document.getElementById('newsSection').style.display = section === 'news' ? 'block' : 'none';
        document.getElementById('footballSection').style.display = section === 'football' ? 'block' : 'none';
        if(section === 'news') fetchNews('dr');
        if(section === 'football') fetchFootball();
    }

    async function fetchNews(source, el) {
        if(el) {
            document.querySelectorAll('.source-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
        const list = document.getElementById('newsList');
        list.innerHTML = '<div class="loading">Henter fra ' + source.toUpperCase() + '...</div>';
        try {
            const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${FEEDS[source]}`);
            const data = await res.json();
            list.innerHTML = data.items.slice(0, 12).map(item => `
                <a href="${item.link}" target="_blank" class="news-card">
                    <span class="news-source">${source.toUpperCase()} • ${item.pubDate.split(' ')[1]}</span>
                    <p class="news-title">${item.title}</p>
                </a>
            `).join('');
        } catch (e) {
            list.innerHTML = '<div class="loading">Fejl ved hentning. Prøv et andet medie.</div>';
        }
    }

    async function fetchFootball() {
        const list = document.getElementById('matchList');
        list.innerHTML = '<div class="loading">Henter live sport...</div>';
        try {
            const res = await fetch('https://api.football-data.org/v4/competitions/PL/matches?limit=8', {
                headers: { 'X-Auth-Token': FOOTBALL_API }
            });
            const data = await res.json();
            list.innerHTML = '<div class="section-label">Premier League</div>' + data.matches.map(m => `
                <div class="match-card">
                    <div class="match-top"><span>${m.status}</span></div>
                    <div class="match-body">
                        <div class="team">${m.homeTeam.shortName || m.homeTeam.name}</div>
                        <div class="score-box"><span class="score-val">${m.score.fullTime.home ?? 0} - ${m.score.fullTime.away ?? 0}</span></div>
                        <div class="team">${m.awayTeam.shortName || m.awayTeam.name}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            list.innerHTML = '<div class="loading" style="color:var(--live)">API grænse nået eller nøgle ikke aktiv.</div>';
        }
    }

    fetchNews('dr');
</script>

</body>
</html>
