<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MiksNews Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/miksdk84-pixel/minmusik/main/M_logo.png">
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root { 
            --gold: #ff9d00;
            --deep: #1a0a00;
            --glass: rgba(10, 10, 10, 0.85);
            --border: rgba(255, 157, 0, 0.15);
            --neural-glow: rgba(255, 157, 0, 0); /* Start uden glød */
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #000; color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
            transition: background 0.5s ease; /* For Neural Glow */
        }

        /* NEURAL GLOW EFFECT */
        body.searching {
            background: radial-gradient(circle at center, rgba(255,157,0,0.15) 0%, #000 70%);
        }

        header { 
            padding: 55px 25px 15px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(10px); background: rgba(0,0,0,0.8);
        }
        .header-logo { width: 30px; height: 30px; filter: drop-shadow(0 0 10px var(--gold)); }
        .ai-status { font-size: 8px; font-weight: 900; color: var(--gold); letter-spacing: 2px; }

        .controls { padding: 15px 20px; }
        .search-container {
            background: var(--glass); border: 1px solid var(--border); border-radius: 16px;
            padding: 18px; backdrop-filter: blur(20px); position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .search-container:focus-within { transform: scale(1.02); border-color: var(--gold); box-shadow: 0 0 30px rgba(255,157,0,0.15); }
        #search { background: transparent; border: none; color: #fff; width: 100%; font-size: 18px; font-weight: 600; outline: none; text-align: center; }
        #search::placeholder { color: #444; }

        .vibe-bar { display: flex; gap: 10px; overflow-x: auto; padding: 10px 20px; scrollbar-width: none; }
        .vibe-pill { 
            background: rgba(255,255,255,0.05); color: #666; padding: 10px 20px; 
            border-radius: 100px; font-size: 11px; font-weight: 800; border: 1px solid transparent; transition: 0.3s;
        }
        .vibe-pill.active { background: rgba(255,157,0,0.1); color: var(--gold); border-color: var(--gold); }

        #results { 
            flex-grow: 1; overflow-y: auto; padding: 10px 15px 150px; 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px;
        }

        /* HAPTIC AI CARD */
        .ai-card { 
            background: var(--glass); border: 1px solid var(--border); border-radius: 18px;
            padding: 20px; display: flex; flex-direction: column; justify-content: flex-end;
            aspect-ratio: 1/1; position: relative; transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            overflow: hidden; backdrop-filter: blur(10px);
        }
        .ai-card:active { transform: scale(0.92); background: rgba(255,157,0,0.1); }
        .ai-card.copied { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,157,0,0.2); }
        
        .t-name { font-weight: 800; font-size: 13px; margin-bottom: 5px; line-height: 1.3; z-index: 2; }
        .t-path { font-size: 8px; color: #444; text-transform: uppercase; letter-spacing: 1px; z-index: 2; }

        .dock { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: linear-gradient(to top, #000 80%, transparent);
            padding: 20px 20px 50px; display: flex; justify-content: center; 
        }
        .panic-btn { 
            background: var(--gold); color: #000; padding: 18px 45px; 
            border-radius: 100px; font-weight: 900; font-size: 13px; letter-spacing: 2px;
            box-shadow: 0 15px 35px rgba(255, 157, 0, 0.4); border: none;
        }

        .status-info { text-align: center; color: #111; grid-column: span 2; padding: 50px; font-weight: 900; font-size: 10px; letter-spacing: 6px; }
    </style>
</head>
<body>

<header>
    <img src="https://raw.githubusercontent.com/miksdk84-pixel/minmusik/main/M_logo.png" class="header-logo">
    <div style="text-align: center;">
        <div style="font-size: 10px; opacity: 0.5; letter-spacing: 2px;">MIKSMUSIK</div>
        <div style="font-weight: 800; font-size: 14px; color: var(--gold);">NEURAL PRO</div>
    </div>
    <div class="ai-status">V1.0</div>
</header>

<div class="controls">
    <div class="search-container">
        <input type="text" id="search" placeholder="Næste sang er ....." onkeyup="aiSearch()" autocomplete="off">
    </div>
</div>

<div class="vibe-bar">
    <div class="vibe-pill active" onclick="setVibe('', this)">Bibliotek</div>
    <div class="vibe-pill" onclick="setVibe('dansk', this)">🇩🇰 Dansk</div>
    <div class="vibe-pill" onclick="setVibe('house', this)">💃 House</div>
    <div class="vibe-pill" onclick="setVibe('remix', this)">🔥 Remix</div>
</div>

<div id="results"></div>

<div class="dock">
    <button class="panic-btn" onclick="panic()">PANIC MODE</button>
</div>

<script>
    let db = [];
    let vibe = '';
    let fuse;

    async function init() {
        try {
            // Henter din musik_data fra hoved-appen
            const response = await fetch('https://raw.githubusercontent.com/miksdk84-pixel/minmusik/4bf097e2ae15eb35c9b3c8ffa0b2c394bbe374b0/musik_data.js');
            let text = await response.text();
            text = text.trim().replace(/const mineSange\s*=\s*/, '').replace(/;$/, '');
            db = JSON.parse(text);
            
            // INITIALISER AI SØGEMOTOR (Fuse.js)
            fuse = new Fuse(db, {
                keys: ['navn', 'sti'],
                threshold: 0.3, // Gør den "fuzzy"
                distance: 100
            });

            document.getElementById('status').innerHTML = "SYSTEM READY // " + db.length + " TRACKS";
            aiSearch();
        } catch (e) {
            document.getElementById('status').innerHTML = "SYSTEM ERROR";
        }
    }

    function setVibe(v, el) {
        document.querySelectorAll('.vibe-pill').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        vibe = v;
        aiSearch();
    }

    function aiSearch() {
        const q = document.getElementById('search').value.toLowerCase();
        const res = document.getElementById('results');
        const body = document.body;
        
        // Aktiver Neural Glow
        if (q.length >= 2) {
            body.classList.add('searching');
        } else {
            body.classList.remove('searching');
        }

        if (q.length < 2 && vibe === '') {
            res.innerHTML = '<div class="status-info">AI STANDBY</div>';
            return;
        }

        let matches;
        if (q.length >= 2) {
            const aiResults = fuse.search(q);
            matches = aiResults.map(r => r.item);
        } else {
            matches = db;
        }

        if (vibe) {
            matches = matches.filter(s => (s.navn + (s.sti || '')).toLowerCase().includes(vibe));
        }

        res.innerHTML = matches.slice(0, 30).map(s => `
            <div class="ai-card" onclick="copy(this, '${(s.sti || '').replace(/'/g, "\\'")}')">
                <span class="t-name">${s.navn}</span>
                <span class="t-path">${s.sti || ''}</span>
            </div>
        `).join('');
    }

    function copy(el, path) {
        navigator.clipboard.writeText(path);
        el.classList.add('copied');
        
        const search = document.getElementById('search');
        search.placeholder = "AI: TRACK COPIED";
        
        setTimeout(() => { 
            el.classList.remove('copied');
            search.placeholder = "Næste sang er .....";
        }, 1200);
    }

    function panic() {
        document.getElementById('search').value = "";
        setVibe('remix', document.querySelectorAll('.vibe-pill')[3]);
    }

    init();
</script>

</body>
</html>
